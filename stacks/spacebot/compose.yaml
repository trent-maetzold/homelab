# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  app:
    container_name: spacebot
    image: ghcr.io/spacedriveapp/spacebot:latest
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/spacebot/app/data:/data
    networks:
      - proxy
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      TZ: "America/Chicago"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19898/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.spacebot.rule: "Host(`bot.trkm.io`)"
      traefik.http.services.spacebot.loadBalancer.server.port: "19898"
      net.unraid.docker.icon: "https://avatars.githubusercontent.com/u/101227423?v=4"
      net.unraid.docker.webui: "https://bot.trkm.io"
      net.unraid.docker.shell: "/bin/bash"

networks:
  proxy:
    external: true
