# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  hd:
    container_name: radarr_hd
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/radarr/hd/config:/config
      - /mnt/user/data:/data
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      RADARR__POSTGRES__HOST: "postgres"
      RADARR__POSTGRES__USER: "radarr"
      RADARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD}"
      RADARR__POSTGRES__MAINDB: "radarr_hd"
      RADARR__POSTGRES__LOGDB: "radarr_hd_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr_hd.rule: "Host(`radarr.trkm.io`)"
      traefik.http.services.radarr_hd.loadBalancer.server.port: "7878"

  uhd:
    container_name: radarr_uhd
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/radarr/uhd/config:/config
      - /mnt/user/data:/data
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      RADARR__POSTGRES__HOST: "postgres"
      RADARR__POSTGRES__USER: "radarr"
      RADARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD}"
      RADARR__POSTGRES__MAINDB: "radarr_uhd"
      RADARR__POSTGRES__LOGDB: "radarr_uhd_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr_uhd.rule: "Host(`radarr.trkm.io`) && PathPrefix(`/uhd`)"
      traefik.http.services.radarr_uhd.loadBalancer.server.port: "7878"

  anime:
    container_name: radarr_anime
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/radarr/anime/config:/config
      - /mnt/user/data:/data
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      RADARR__POSTGRES__HOST: "postgres"
      RADARR__POSTGRES__USER: "radarr"
      RADARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD}"
      RADARR__POSTGRES__MAINDB: "radarr_anime"
      RADARR__POSTGRES__LOGDB: "radarr_anime_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr_anime.rule: "Host(`radarr.trkm.io`) && PathPrefix(`/anime`)"
      traefik.http.services.radarr_anime.loadBalancer.server.port: "7878"

networks:
  pvr:
    external: true
  proxy:
    external: true
  postgres:
    external: true
