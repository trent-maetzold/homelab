# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  hd:
    container_name: radarr_hd
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/radarr/hd/config:/config
      - /mnt/user/data:/data
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      RADARR__APP__INSTANCENAME: "Radarr HD"
      RADARR__SERVER__URLBASE: "/hd"
      RADARR__AUTH__METHOD: "External"
      RADARR__AUTH__APIKEY: "${ARR_API_KEY:?ARR_API_KEY is required}"
      RADARR__UPDATE__MECHANISM: "Docker"
      RADARR__POSTGRES__HOST: "postgres"
      RADARR__POSTGRES__USER: "radarr"
      RADARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}"
      RADARR__POSTGRES__MAINDB: "radarr_hd"
      RADARR__POSTGRES__LOGDB: "radarr_hd_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr-hd.rule: "Host(`radarr.trkm.io`) && PathPrefix(`/hd`)"
      traefik.http.services.radarr-hd.loadBalancer.server.port: "7878"
      traefik.http.middlewares.radarr-root-redirect.redirectRegex.regex: "^https://radarr.trkm.io/$"
      traefik.http.middlewares.radarr-root-redirect.redirectRegex.replacement: "https://radarr.trkm.io/hd/"
      traefik.http.middlewares.radarr-root-redirect.redirectRegex.permanent: "true"
      traefik.http.routers.radarr-root.rule: "Host(`radarr.trkm.io`) && Path(`/`)"
      traefik.http.routers.radarr-root.middlewares: "radarr-root-redirect"
      traefik.http.routers.radarr-root.service: "radarr-hd"

  uhd:
    container_name: radarr_uhd
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/radarr/uhd/config:/config
      - /mnt/user/data:/data
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      RADARR__APP__INSTANCENAME: "Radarr UHD"
      RADARR__SERVER__URLBASE: "/uhd"
      RADARR__AUTH__METHOD: "External"
      RADARR__AUTH__APIKEY: "${ARR_API_KEY}"
      RADARR__UPDATE__MECHANISM: "Docker"
      RADARR__POSTGRES__HOST: "postgres"
      RADARR__POSTGRES__USER: "radarr"
      RADARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD}"
      RADARR__POSTGRES__MAINDB: "radarr_uhd"
      RADARR__POSTGRES__LOGDB: "radarr_uhd_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr-uhd.rule: "Host(`radarr.trkm.io`) && PathPrefix(`/uhd`)"
      traefik.http.services.radarr-uhd.loadBalancer.server.port: "7878"

  anime:
    container_name: radarr_anime
    image: lscr.io/linuxserver/radarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/radarr/anime/config:/config
      - /mnt/user/data:/data
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      RADARR__APP__INSTANCENAME: "Radarr Anime"
      RADARR__SERVER__URLBASE: "/anime"
      RADARR__AUTH__METHOD: "External"
      RADARR__AUTH__APIKEY: "${ARR_API_KEY}"
      RADARR__UPDATE__MECHANISM: "Docker"
      RADARR__POSTGRES__HOST: "postgres"
      RADARR__POSTGRES__USER: "radarr"
      RADARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD}"
      RADARR__POSTGRES__MAINDB: "radarr_anime"
      RADARR__POSTGRES__LOGDB: "radarr_anime_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.radarr-anime.rule: "Host(`radarr.trkm.io`) && PathPrefix(`/anime`)"
      traefik.http.services.radarr-anime.loadBalancer.server.port: "7878"

networks:
  pvr:
    external: true
  proxy:
    external: true
  postgres:
    external: true
