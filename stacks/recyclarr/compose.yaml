# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  recyclarr:
    container_name: recyclarr
    image: ghcr.io/recyclarr/recyclarr:latest
    restart: unless-stopped
    user: 99:100
    volumes:
      - ./config/recyclarr.yml:/config/recyclarr.yml
      - ./config/settings.yml:/config/settings.yml
      - /mnt/user/appdata/recyclarr/logs:/config/logs
      - /mnt/user/appdata/recyclarr/cache:/config/cache
    networks:
      - pvr
    environment:
      CRON_SCHEDULE: "@daily"
      RECYCLARR_CREATE_CONFIG: "false"
      TZ: "America/Chicago"
      RADARR_HD_URL: "${RADARR_HD_URL}"
      RADARR_HD_API_KEY: "${RADARR_HD_API_KEY}"
      RADARR_4K_URL: "${RADARR_4K_URL}"
      RADARR_4K_API_KEY: "${RADARR_4K_API_KEY}"
      RADARR_ANIME_URL: "${RADARR_ANIME_URL}"
      RADARR_ANIME_API_KEY: "${RADARR_ANIME_API_KEY}"
      SONARR_HD_URL: "${SONARR_HD_URL}"
      SONARR_HD_API_KEY: "${SONARR_HD_API_KEY}"
      SONARR_4K_URL: "${SONARR_4K_URL}"
      SONARR_4K_API_KEY: "${SONARR_4K_API_KEY}"
      SONARR_ANIME_URL: "${SONARR_ANIME_URL}"
      SONARR_ANIME_API_KEY: "${SONARR_ANIME_API_KEY}"
    labels:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/homarr-labs/dashboard-icons/refs/heads/main/png/recyclarr.png"
      net.unraid.docker.shell: "/bin/bash"

networks:
  pvr:
    external: true
