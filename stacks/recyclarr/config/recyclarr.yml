# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json

radarr:
  radarr_hd:
    base_url: !env_var RADARR_HD_URL
    api_key: !env_var ARR_API_KEY
    media_naming:
      folder: plex
      movie:
        rename: true
        standard: default
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      - config: includes/radarr-hd.yml

  radarr_uhd:
    base_url: !env_var RADARR_UHD_URL
    api_key: !env_var ARR_API_KEY
    media_naming:
      folder: plex
      movie:
        rename: true
        standard: default
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      - config: includes/radarr-uhd.yml

  radarr_anime:
    base_url: !env_var RADARR_ANIME_URL
    api_key: !env_var ARR_API_KEY
    media_naming:
      folder: plex
      movie:
        rename: true
        standard: default
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      - config: includes/radarr-anime.yml

sonarr:
  sonarr_hd:
    base_url: !env_var SONARR_HD_URL
    api_key: !env_var ARR_API_KEY
    media_naming:
      series: plex
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      - config: includes/sonarr-hd.yml

  sonarr_uhd:
    base_url: !env_var SONARR_UHD_URL
    api_key: !env_var ARR_API_KEY
    media_naming:
      series: plex
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      - config: includes/sonarr-uhd.yml

  sonarr_anime:
    base_url: !env_var SONARR_ANIME_URL
    api_key: !env_var ARR_API_KEY
    media_naming:
      series: plex
      season: default
      episodes:
        rename: true
        standard: default
        daily: default
        anime: default
    delete_old_custom_formats: true
    replace_existing_custom_formats: true
    include:
      - config: includes/sonarr-anime.yml
