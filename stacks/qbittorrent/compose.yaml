# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  app:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/qbittorrent/app/config:/config
      - /mnt/user/data/torrents:/data/torrents
    network_mode: "service:vpn"
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    depends_on:
      - vpn

  vpn:
    container_name: qbittorrent_vpn
    image: qmcgaw/gluetun:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "6881:6881"
      - "6881:6881/udp"
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /mnt/cache/appdata/qbittorrent/vpn/config:/gluetun
    networks:
      - pvr
      - proxy
    environment:
      TZ: "America/Chicago"
      SERVER_CITIES: "Chicago"
      PORT_FORWARD_ONLY: "on"
      VPN_TYPE: "wireguard"
      VPN_SERVICE_PROVIDER: "protonvpn"
      VPN_PORT_FORWARDING: "on"
      WIREGUARD_PRIVATE_KEY: "${WIREGUARD_PRIVATE_KEY}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.qbittorrent.rule: "Host(`bt.trkm.io`)"
      traefik.http.services.qbittorrent.loadBalancer.server.port: "8080"

networks:
  pvr:
    external: true
  proxy:
    external: true
