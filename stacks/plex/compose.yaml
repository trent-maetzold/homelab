# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  app:
    container_name: plex
    image: lscr.io/linuxserver/plex:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/plex/app/config:/config
      - /mnt/cache/appdata/plex/app/transcode:/transcode
      - /mnt/user/data/media:/media:ro
    network_mode: host
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      PLEX_PASS: "yes"
