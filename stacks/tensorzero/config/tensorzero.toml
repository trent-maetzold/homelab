# TensorZero Gateway Configuration
# Docs: https://www.tensorzero.com/docs/gateway/configuration-reference

# =============================================================================
# Gateway
# =============================================================================

[gateway]
auth.enabled = true
bind_address = "0.0.0.0:3000"
disable_pseudonymous_usage_analytics = true
observability.enabled = true

# =============================================================================
# Provider defaults
# =============================================================================

[provider_types.anthropic.defaults]
api_key_location = "env::ANTHROPIC_API_KEY"

# =============================================================================
# Anthropic models
# =============================================================================

[models.claude_haiku_4_5]
routing = ["anthropic"]

[models.claude_haiku_4_5.providers.anthropic]
type = "anthropic"
model_name = "claude-haiku-4-5"
extra_body = [
  { pointer = "/system/0/cache_control", value = { type = "ephemeral" } },
]

[models.claude_sonnet_4_6]
routing = ["anthropic"]

[models.claude_sonnet_4_6.providers.anthropic]
type = "anthropic"
model_name = "claude-sonnet-4-6"
extra_body = [
  { pointer = "/system/0/cache_control", value = { type = "ephemeral" } },
]

[models.claude_opus_4_6]
routing = ["anthropic"]

[models.claude_opus_4_6.providers.anthropic]
type = "anthropic"
model_name = "claude-opus-4-6"
extra_body = [
  { pointer = "/system/0/cache_control", value = { type = "ephemeral" } },
]
