# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  gateway:
    container_name: tensorzero
    image: tensorzero/gateway
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/tensorzero/config:/app/config:ro
    networks:
      - clickhouse
      - postgres
      - proxy
    environment:
      TZ: America/Chicago
      ANTHROPIC_OAUTH_TOKEN: ${ANTHROPIC_OAUTH_TOKEN}
      GITHUB_COPILOT_API_KEY: ${GITHUB_COPILOT_API_KEY}
      TENSORZERO_CLICKHOUSE_URL: http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/tensorzero
      TENSORZERO_POSTGRES_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/tensorzero
    depends_on:
      health:
        condition: service_healthy
    command: ["--config-file", "config/tensorzero.toml"]
    labels:
      traefik.enable: true
      traefik.http.routers.tensorzero.rule: Host(`llm.trkm.io`)
      traefik.http.services.tensorzero.loadBalancer.server.port: 3000
      net.unraid.docker.icon: https://avatars.githubusercontent.com/u/148420822
      net.unraid.docker.webui: https://llm.trkm.io
      net.unraid.docker.shell: /bin/sh

  ui:
    container_name: tensorzero_ui
    image: tensorzero/ui
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/tensorzero/config:/app/config:ro
    networks:
      - clickhouse
      - postgres
      - proxy
    environment:
      TZ: America/Chicago
      TENSORZERO_GATEWAY_URL: http://tensorzero:3000
      TENSORZERO_CLICKHOUSE_URL: http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/tensorzero
    depends_on:
      health:
        condition: service_healthy
    labels:
      traefik.enable: true
      traefik.http.routers.tensorzero-ui.rule: Host(`llm.trkm.io`) && PathPrefix(`/ui`)
      traefik.http.services.tensorzero-ui.loadBalancer.server.port: 4000
      net.unraid.docker.icon: https://avatars.githubusercontent.com/u/148420822
      net.unraid.docker.webui: https://llm.trkm.io/ui
      net.unraid.docker.shell: /bin/sh

  health:
    container_name: tensorzero_health
    image: busybox
    restart: unless-stopped
    networks:
      - clickhouse
    environment:
      TZ: America/Chicago
    healthcheck:
      test: wget --spider --tries 1 http://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:8123/ping
      start_period: 30s
      start_interval: 1s
      timeout: 1s
    labels:
      net.unraid.docker.icon: https://avatars.githubusercontent.com/u/148420822
      net.unraid.docker.shell: /bin/sh

networks:
  clickhouse:
    external: true
  postgres:
    external: true
  proxy:
    external: true
