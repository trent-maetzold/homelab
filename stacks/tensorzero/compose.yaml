# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  gateway:
    container_name: tensorzero
    image: tensorzero/gateway
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/tensorzero/shared/config:/app/config:ro
      - ./config/tensorzero.toml:/app/config/tensorzero.toml:ro
      - ./config/functions:/app/config/functions:ro
    networks:
      - net
      - proxy
      - clickhouse
    environment:
      TZ: "America/Chicago"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}"
      TENSORZERO_CLICKHOUSE_URL: "http://tensorzero:${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD is required}@clickhouse:8123/tensorzero"
      TENSORZERO_POSTGRES_URL: "postgresql://tensorzero:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/tensorzero"
    depends_on:
      db:
        condition: service_healthy
      clickhouse:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "--tries", "1", "http://localhost:3000/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: ["--config-file", "/app/config/tensorzero.toml"]
    labels:
      traefik.enable: "true"
      traefik.http.routers.tensorzero.rule: "Host(`llm.trkm.io`)"
      traefik.http.services.tensorzero.loadBalancer.server.port: "3000"

  ui:
    container_name: tensorzero_ui
    image: tensorzero/ui
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/tensorzero/shared/config:/app/config:ro
      - ./config/tensorzero.toml:/app/config/tensorzero.toml:ro
      - ./config/functions:/app/config/functions:ro
    networks:
      - net
      - proxy
    environment:
      TZ: "America/Chicago"
      TENSORZERO_GATEWAY_URL: "http://gateway:3000"
      TENSORZERO_API_KEY: "${TENSORZERO_API_KEY:?TENSORZERO_API_KEY is required}"
      TENSORZERO_POSTGRES_URL: "postgresql://tensorzero:${POSTGRES_PASSWORD}@db:5432/tensorzero"
    depends_on:
      gateway:
        condition: service_started
    labels:
      traefik.enable: "true"
      traefik.http.routers.tensorzero-ui.rule: "Host(`t0.trkm.io`)"
      traefik.http.services.tensorzero-ui.loadBalancer.server.port: "4000"

  db:
    container_name: tensorzero_db
    image: tensorzero/postgres:18
    restart: unless-stopped
    volumes:
      - /mnt/cache/dbdata/tensorzero/db/data:/var/lib/postgresql
    networks:
      - net
    environment:
      TZ: "America/Chicago"
      POSTGRES_DB: "tensorzero"
      POSTGRES_USER: "tensorzero"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "tensorzero", "-d", "tensorzero"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
      start_interval: 1s

networks:
  net:
  proxy:
    external: true
  clickhouse:
    external: true
