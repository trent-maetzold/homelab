# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  core:
    container_name: komodo
    image: ghcr.io/moghtech/komodo-core:latest
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata/komodo/backups:/backups
    networks:
      - net
      - proxy
    environment:
      TZ: "America/Chicago"
      KOMODO_HOST: "https://komodo.trkm.io"
      KOMODO_TITLE: "Komodo"
      KOMODO_DATABASE_ADDRESS: "mongo:27017"
      KOMODO_DATABASE_USERNAME: "komodo"
      KOMODO_DATABASE_PASSWORD: "${MONGO_PASSWORD}"
      KOMODO_FIRST_SERVER: "http://periphery:8120"
      KOMODO_FIRST_SERVER_NAME: "unraid"
      KOMODO_PASSKEY: "${KOMODO_PASSKEY}"
      KOMODO_WEBHOOK_SECRET: "${KOMODO_WEBHOOK_SECRET}"
      KOMODO_JWT_SECRET: "${KOMODO_JWT_SECRET}"
      KOMODO_LOCAL_AUTH: "true"
      KOMODO_INIT_ADMIN_USERNAME: "trkm"
      KOMODO_INIT_ADMIN_PASSWORD: "${KOMODO_ADMIN_PASSWORD}"
      KOMODO_DISABLE_USER_REGISTRATION: "true"
    depends_on:
      - mongo
    labels:
      komodo.skip:
      traefik.enable: "true"
      traefik.http.routers.komodo.rule: "Host(`komodo.trkm.io`)"
      traefik.http.services.komodo.loadBalancer.server.port: "9120"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/homarr-labs/dashboard-icons/refs/heads/main/png/komodo.png"
      net.unraid.docker.webui: "https://komodo.trkm.io"
      net.unraid.docker.shell: "/bin/bash"

  periphery:
    container_name: komodo_periphery
    image: ghcr.io/moghtech/komodo-periphery:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/proc
      - /etc/komodo:/etc/komodo
    networks:
      - net
    environment:
      TZ: "America/Chicago"
      PERIPHERY_ROOT_DIRECTORY: "/etc/komodo"
      PERIPHERY_PASSKEYS: "${KOMODO_PASSKEY}"
      PERIPHERY_SSL_ENABLED: "false"
      PERIPHERY_INCLUDE_DISK_MOUNTS: "/etc/hostname"
    labels:
      komodo.skip:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/homarr-labs/dashboard-icons/refs/heads/main/png/komodo.png"
      net.unraid.docker.shell: "/bin/bash"

  mongo:
    container_name: komodo_mongo
    image: mongo:latest
    restart: unless-stopped
    volumes:
      - /mnt/user/appdata-db/mongo/komodo/data:/data/db
      - /mnt/user/appdata-db/mongo/komodo/config:/data/configdb
    networks:
      - net
    environment:
      TZ: "America/Chicago"
      MONGO_INITDB_ROOT_USERNAME: "komodo"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}"
    command: ["--quiet", "--wiredTigerCacheSizeGB", "0.25"]
    labels:
      komodo.skip:
      net.unraid.docker.icon: "https://raw.githubusercontent.com/homarr-labs/dashboard-icons/refs/heads/main/png/mongodb.png"
      net.unraid.docker.shell: "/bin/bash"

networks:
  net:
  proxy:
    external: true
