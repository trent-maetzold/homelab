# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  app:
    container_name: contextforge
    image: ghcr.io/ibm/mcp-context-forge:latest
    restart: unless-stopped
    networks:
      - mcp
      - proxy
      - postgres
    environment:
      TZ: "America/Chicago"
      HOST: "0.0.0.0"
      APP_DOMAIN: "https://api.trkm.io"
      APP_ROOT_PATH: "/mcp"
      DATABASE_URL: "postgresql+psycopg://contextforge:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres/contextforge"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}"
      AUTH_ENCRYPTION_SECRET: "${AUTH_ENCRYPTION_SECRET:?AUTH_ENCRYPTION_SECRET is required}"
      PLATFORM_ADMIN_EMAIL: "${PLATFORM_ADMIN_EMAIL:?PLATFORM_ADMIN_EMAIL is required}"
      PLATFORM_ADMIN_PASSWORD: "${PLATFORM_ADMIN_PASSWORD:?PLATFORM_ADMIN_PASSWORD is required}"
      MCPGATEWAY_UI_ENABLED: "true"
      MCPGATEWAY_ADMIN_API_ENABLED: "true"
      AUTH_REQUIRED: "false"
      SSRF_ALLOW_PRIVATE_NETWORKS: "true"
      TRANSPORT_TYPE: "all"
      LOG_LEVEL: "INFO"
    healthcheck:
      test:
        - "CMD"
        - "curl"
        - "--fail"
        - "--retry"
        - "1"
        - "http://localhost:4444/health"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.contextforge.rule: "Host(`api.trkm.io`) && PathPrefix(`/mcp`)"
      traefik.http.services.contextforge.loadBalancer.server.port: "4444"

networks:
  mcp:
    external: true
  proxy:
    external: true
  postgres:
    external: true
