# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  gateway:
    container_name: openclaw
    image: ghcr.io/openclaw/openclaw:latest
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - /mnt/cache/appdata/openclaw/gateway/home:/home
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json
    networks:
      - proxy
    environment:
      TZ: "America/Chicago"
      OPENCLAW_GATEWAY_TOKEN: "${OPENCLAW_GATEWAY_TOKEN:?OPENCLAW_GATEWAY_TOKEN is required}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required}"
      NPM_CONFIG_PREFIX: "/home/node/.local"
      CARGO_INSTALL_ROOT: "/home/node/.local"
      GOBIN: "/home/node/.local/bin"
    healthcheck:
      test:
        ["wget", "--spider", "--tries", "1", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.openclaw.rule: "Host(`claw.trkm.io`)"
      traefik.http.services.openclaw.loadBalancer.server.port: "18789"

networks:
  proxy:
    external: true
