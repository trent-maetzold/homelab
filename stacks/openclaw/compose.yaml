# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  openclaw:
    container_name: openclaw
    image: registry.gitlab.com/hardmcp/openclaw:latest
    restart: unless-stopped
    volumes:
      # openclaw data
      - /mnt/user/appdata/openclaw/home:/home/node
      - /mnt/user/appdata/openclaw/certs:/certs/client:ro
      - /mnt/user/appdata/openclaw/appdata:/mnt/user/appdata
      # host references (read-only)
      - /mnt/user/appdata:/mnt/user/appdata-ro:ro
      - /mnt/user/data:/mnt/user/data-ro:ro
      # unraid shares
      - /mnt/user/isos:/mnt/user/isos
      - /mnt/user/domains/templates:/mnt/user/domains/templates
      # media (read-only)
      - /mnt/user/docs:/mnt/user/docs:ro
      - /mnt/user/immich-data:/mnt/user/immich-data:ro
      - /mnt/user/photos:/mnt/user/photos:ro
      - /mnt/user/photos_manual:/mnt/user/photos_manual:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - proxy
      - mcp
      - net
    environment:
      TZ: America/Chicago
      DOCKER_HOST: tcp://dind:2376
      DOCKER_TLS_VERIFY: "1"
      DOCKER_CERT_PATH: /certs/client
      ANTHROPIC_OAUTH_TOKEN: ${ANTHROPIC_OAUTH_TOKEN}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      MCP_TOKEN: ${MCP_TOKEN}
      MCP_PORTAINER_URL: http://mcp-portainer:8000
      MCP_GITLAB_URL: http://mcp-gitlab:8000
    labels:
      net.unraid.docker.icon: https://raw.githubusercontent.com/homarr-labs/dashboard-icons/refs/heads/main/png/openclaw.png
      net.unraid.docker.webui: https://claw.trkm.io/
      net.unraid.docker.shell: /bin/bash
      traefik.enable: true
      traefik.http.routers.openclaw.rule: Host(`claw.trkm.io`)
      traefik.http.services.openclaw.loadBalancer.server.port: 18789

  dind:
    container_name: openclaw_dind
    image: docker:dind
    restart: unless-stopped
    privileged: true
    volumes:
      - /mnt/user/appdata/openclaw/dind:/var/lib/docker
      - /mnt/user/appdata/openclaw/certs:/certs
      - /mnt/user/appdata/openclaw/appdata:/mnt/user/appdata
    networks:
      - net
    environment:
      TZ: America/Chicago
      DOCKER_TLS_CERTDIR: /certs
    labels:
      net.unraid.docker.icon: https://raw.githubusercontent.com/homarr-labs/dashboard-icons/refs/heads/main/png/docker.png
      net.unraid.docker.shell: /bin/sh

networks:
  proxy:
    external: true
  mcp:
    external: true
  net:
