# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  hd:
    container_name: sonarr_hd
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/sonarr/hd/config:/config
      - /mnt/user/data:/data
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      SONARR__APP__INSTANCENAME: "Sonarr HD"
      SONARR__SERVER__URLBASE: "/hd"
      SONARR__AUTH__METHOD: "External"
      SONARR__AUTH__APIKEY: "${ARR_API_KEY}"
      SONARR__UPDATE__MECHANISM: "Docker"
      SONARR__POSTGRES__HOST: "postgres"
      SONARR__POSTGRES__USER: "sonarr"
      SONARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD}"
      SONARR__POSTGRES__MAINDB: "sonarr_hd"
      SONARR__POSTGRES__LOGDB: "sonarr_hd_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.sonarr-hd.rule: "Host(`sonarr.trkm.io`) && PathPrefix(`/hd`)"
      traefik.http.services.sonarr-hd.loadBalancer.server.port: "8989"
      traefik.http.middlewares.sonarr-root-redirect.redirectRegex.regex: "^https://sonarr.trkm.io/$"
      traefik.http.middlewares.sonarr-root-redirect.redirectRegex.replacement: "https://sonarr.trkm.io/hd/"
      traefik.http.middlewares.sonarr-root-redirect.redirectRegex.permanent: "true"
      traefik.http.routers.sonarr-root.rule: "Host(`sonarr.trkm.io`) && Path(`/`)"
      traefik.http.routers.sonarr-root.middlewares: "sonarr-root-redirect"
      traefik.http.routers.sonarr-root.service: "sonarr-hd"

  uhd:
    container_name: sonarr_uhd
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/sonarr/uhd/config:/config
      - /mnt/user/data:/data
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      SONARR__APP__INSTANCENAME: "Sonarr UHD"
      SONARR__SERVER__URLBASE: "/uhd"
      SONARR__AUTH__METHOD: "External"
      SONARR__AUTH__APIKEY: "${ARR_API_KEY}"
      SONARR__UPDATE__MECHANISM: "Docker"
      SONARR__POSTGRES__HOST: "postgres"
      SONARR__POSTGRES__USER: "sonarr"
      SONARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD}"
      SONARR__POSTGRES__MAINDB: "sonarr_uhd"
      SONARR__POSTGRES__LOGDB: "sonarr_uhd_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.sonarr-uhd.rule: "Host(`sonarr.trkm.io`) && PathPrefix(`/uhd`)"
      traefik.http.services.sonarr-uhd.loadBalancer.server.port: "8989"

  anime:
    container_name: sonarr_anime
    image: lscr.io/linuxserver/sonarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/sonarr/anime/config:/config
      - /mnt/user/data:/data
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      SONARR__APP__INSTANCENAME: "Sonarr Anime"
      SONARR__SERVER__URLBASE: "/anime"
      SONARR__AUTH__METHOD: "External"
      SONARR__AUTH__APIKEY: "${ARR_API_KEY}"
      SONARR__UPDATE__MECHANISM: "Docker"
      SONARR__POSTGRES__HOST: "postgres"
      SONARR__POSTGRES__USER: "sonarr"
      SONARR__POSTGRES__PASSWORD: "${POSTGRES_PASSWORD}"
      SONARR__POSTGRES__MAINDB: "sonarr_anime"
      SONARR__POSTGRES__LOGDB: "sonarr_anime_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.sonarr-anime.rule: "Host(`sonarr.trkm.io`) && PathPrefix(`/anime`)"
      traefik.http.services.sonarr-anime.loadBalancer.server.port: "8989"

networks:
  pvr:
    external: true
  proxy:
    external: true
  postgres:
    external: true
