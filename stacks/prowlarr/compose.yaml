# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  app:
    container_name: prowlarr
    image: lscr.io/linuxserver/prowlarr:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/prowlarr/app/config:/config
    networks:
      - pvr
      - proxy
      - postgres
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
      PROWLARR_POSTGRES_HOST: "postgres"
      PROWLARR_POSTGRES_USER: "prowlarr"
      PROWLARR_POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      PROWLARR_POSTGRES_MAIN_DB: "prowlarr"
      PROWLARR_POSTGRES_LOG_DB: "prowlarr_log"
    labels:
      traefik.enable: "true"
      traefik.http.routers.prowlarr.rule: "Host(`prowlarr.trkm.io`)"
      traefik.http.services.prowlarr.loadBalancer.server.port: "9696"

networks:
  pvr:
    external: true
  proxy:
    external: true
  postgres:
    external: true
