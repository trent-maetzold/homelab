# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

services:
  app:
    container_name: sabnzbd
    image: lscr.io/linuxserver/sabnzbd:latest
    restart: unless-stopped
    volumes:
      - /mnt/cache/appdata/sabnzbd/app/config:/config
      - /mnt/user/data/usenet:/data/usenet
    network_mode: "service:vpn"
    environment:
      PUID: "99"
      PGID: "100"
      UMASK: "022"
      TZ: "America/Chicago"
    depends_on:
      - vpn

  vpn:
    container_name: sabnzbd_vpn
    image: qmcgaw/gluetun:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /mnt/cache/appdata/sabnzbd/vpn/config:/gluetun
    networks:
      - pvr
      - proxy
    environment:
      TZ: "America/Chicago"
      VPN_SERVICE_PROVIDER: "protonvpn"
      VPN_TYPE: "wireguard"
      WIREGUARD_PRIVATE_KEY: "${WIREGUARD_PRIVATE_KEY}"
      SERVER_CITIES: "Chicago"
    labels:
      traefik.enable: "true"
      traefik.http.routers.sabnzbd.rule: "Host(`nzb.trkm.io`)"
      traefik.http.services.sabnzbd.loadBalancer.server.port: "8080"

networks:
  pvr:
    external: true
  proxy:
    external: true
