# TensorZero Gateway Configuration
# Docs: https://www.tensorzero.com/docs/gateway/configuration-reference

# =============================================================================
# Gateway
# =============================================================================

[gateway]
bind_address = "0.0.0.0:3000"
auth.enabled = true
disable_pseudonymous_usage_analytics = true
observability.enabled = true

# =============================================================================
# Provider defaults
# =============================================================================

[provider_types.anthropic.defaults]
api_key_location = "env::ANTHROPIC_API_KEY"

# =============================================================================
# Anthropic models
# =============================================================================

[models.claude_haiku_4_5]
routing = ["anthropic"]

[models.claude_haiku_4_5.providers.anthropic]
type = "anthropic"
model_name = "claude-haiku-4-5"

[models.claude_sonnet_4_6]
routing = ["anthropic"]

[models.claude_sonnet_4_6.providers.anthropic]
type = "anthropic"
model_name = "claude-sonnet-4-6"

[models.claude_opus_4_6]
routing = ["anthropic"]

[models.claude_opus_4_6.providers.anthropic]
type = "anthropic"
model_name = "claude-opus-4-6"

# =============================================================================
# Assistant
# =============================================================================

[functions.assistant]
type = "chat"

[functions.assistant.variants.fast]
type = "chat_completion"
model = "claude_haiku_4_5"
max_tokens = 2048
temperature = 0.2
reasoning_effort = "low"

[functions.assistant.variants.deep]
type = "chat_completion"
model = "claude_opus_4_6"
max_tokens = 4096
temperature = 0.2
thinking_budget_tokens = 12000

# =============================================================================
# Coding
# =============================================================================

[functions.coding]
type = "chat"

[functions.coding.variants.fast]
type = "chat_completion"
model = "claude_sonnet_4_6"
max_tokens = 4096
temperature = 0.1
reasoning_effort = "low"

[functions.coding.variants.careful]
type = "chat_completion"
model = "claude_opus_4_6"
max_tokens = 8192
temperature = 0.1
thinking_budget_tokens = 16000

# =============================================================================
# Orchestration
# =============================================================================

[functions.orchestration]
type = "chat"

[functions.orchestration.variants.planner]
type = "chat_completion"
model = "claude_sonnet_4_6"
max_tokens = 4096
temperature = 0.2
reasoning_effort = "medium"

[functions.orchestration.variants.executor]
type = "chat_completion"
model = "claude_sonnet_4_6"
max_tokens = 3072
temperature = 0.1
reasoning_effort = "low"

# =============================================================================
# Structured output
# =============================================================================

[functions.structured_output]
type = "json"

[functions.structured_output.variants.cheap]
type = "chat_completion"
model = "claude_haiku_4_5"
max_tokens = 2048
temperature = 0.0
reasoning_effort = "low"

[functions.structured_output.variants.strong]
type = "chat_completion"
model = "claude_sonnet_4_6"
max_tokens = 4096
temperature = 0.0
reasoning_effort = "medium"
