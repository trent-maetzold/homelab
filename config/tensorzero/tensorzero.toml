# TensorZero Gateway Configuration
# Docs: https://www.tensorzero.com/docs/gateway/configuration-reference

[gateway]
bind_address = "0.0.0.0:3000"
disable_pseudonymous_usage_analytics = true

# ── Anthropic ───────────────────────────────────────────────────────────────

[models.claude-opus-4-6]
routing = ["anthropic"]

[models.claude-opus-4-6.providers.anthropic]
type = "anthropic"
model_name = "claude-opus-4-6"
api_key_location = "env::ANTHROPIC_API_KEY"

[models.claude-sonnet-4-6]
routing = ["anthropic"]

[models.claude-sonnet-4-6.providers.anthropic]
type = "anthropic"
model_name = "claude-sonnet-4-6"
api_key_location = "env::ANTHROPIC_API_KEY"

[models.claude-haiku-4-5]
routing = ["anthropic"]

[models.claude-haiku-4-5.providers.anthropic]
type = "anthropic"
model_name = "claude-haiku-4-5"
api_key_location = "env::ANTHROPIC_API_KEY"

# ── GitHub Copilot (OpenAI-compatible) ──────────────────────────────────────
# Multiplier 0 = free/unlimited on paid plan
# Multiplier 1 = standard rate on paid plan

[models.gpt-4o]
routing = ["github-copilot"]

[models.gpt-4o.providers.github-copilot]
type = "openai"
model_name = "gpt-4o"
api_key_location = "env::GITHUB_COPILOT_API_KEY"
api_base = "https://api.githubcopilot.com"

